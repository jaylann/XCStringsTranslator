# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
# CodeRabbit configuration. Docs: https://docs.coderabbit.ai/guides/configure-coderabbit
language: en-US
early_access: false

reviews:
  profile: chill            # concise, signal-over-noise feedback
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  path_filters:
    - "!**/*.lock"
    - "!**/*.xcstrings"     # generated/translated localization data, not source
  tools:
    ruff:
      enabled: true         # matches the repo's existing ruff lint + format setup

chat:
  auto_reply: true
