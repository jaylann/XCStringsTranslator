name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `xcstrings --version` or the installed package version
      placeholder: "1.0.0"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - Claude (Anthropic)
        - GPT (OpenAI)
        - Gemini (Google)
        - OpenRouter
        - Other / N/A
    validations:
      required: true

  - type: input
    id: model
    attributes:
      label: Model
      placeholder: "haiku, gpt-5.5, gemini-3.5, ..."

  - type: textarea
    id: command
    attributes:
      label: Command run
      description: The exact command you executed
      render: shell
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual behaviour
      description: What you expected to happen, and what actually happened (include error output / traceback)
    validations:
      required: true

  - type: textarea
    id: snippet
    attributes:
      label: Minimal .xcstrings snippet
      description: A small input that reproduces the issue (redact any private strings)
      render: json
